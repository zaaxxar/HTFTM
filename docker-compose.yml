# RELAY — M1 scaffold (see halal_translator/docs/design.md §3).
# Brings up stubbed services: server (FastAPI), nginx (LAN front door), postgres, minio.
# `docker compose up --build` coming up cleanly is the M1 exit gate — no feature logic yet.
#
# Non-secret DEV defaults are inline as ${VAR:-default} so it runs out of the box.
# Override them (and set OPENAI_API_KEY) via .env — copy from .env.example. Secrets stay
# server-side and out of git (golden rule #1).

name: relay

services:
  # --- FastAPI app: holds the OpenAI session, capture WS, recording, signaling (design §2) ---
  server:
    build: ./halal_translator/server
    environment:
      RELAY_ENV: ${RELAY_ENV:-dev}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}            # server-side only; unused at M1
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://relay:relay_dev_pw@postgres:5432/relay}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-relay-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-relay_dev_minio_pw}
      RELAY_RECORDINGS_BUCKET: ${RELAY_RECORDINGS_BUCKET:-relay-recordings}
      # OpenAI realtime translation session (design §8). No voice param: the translate
      # endpoint adapts the voice to the source speaker (preserves tone, FR-2).
      RELAY_SOURCE_LANG: ${RELAY_SOURCE_LANG:-ar}
      RELAY_TARGET_LANG: ${RELAY_TARGET_LANG:-en}
      RELAY_SCRATCH_DIR: /scratch                     # M2 Checkpoint A verification output
    volumes:
      - hls:/srv/hls                                  # translated audio -> LL-HLS (written at M3)
      - ./scratch:/scratch                            # gitignored; local .wav for auditioning (M2-A)
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # --- nginx: single LAN entry point — serves static pages + HLS, reverse-proxies /api + /ws (design §3, §7) ---
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"                                     # http://<server-lan-ip>:8080/
    volumes:
      - ./halal_translator/streaming/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./halal_translator/listener:/usr/share/nginx/html/listener:ro
      - ./halal_translator/capture:/usr/share/nginx/html/capture:ro
      - ./halal_translator/streaming/admin:/usr/share/nginx/html/admin:ro
      - hls:/srv/hls:ro                               # serve LL-HLS read-only (empty until M3)
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- PostgreSQL: metadata only (golden rule #3). Schema loaded on first init (design §6) ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-relay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-relay_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-relay}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./halal_translator/server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-relay} -d $${POSTGRES_DB:-relay}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- MinIO: S3-compatible blob storage for recordings (design §2). Bucket provisioned by the server at M2 ---
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"                                   # S3 API
      - "9001:9001"                                   # console (ops)
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-relay-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-relay_dev_minio_pw}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
  hls:
