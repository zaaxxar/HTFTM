# RELAY nginx — M1 scaffold (design §3, §7).
# Single LAN front door: serves the static pages + LL-HLS, reverse-proxies /api + /ws to the server.
# Loaded into the http{} context via /etc/nginx/conf.d/default.conf.

upstream relay_server {
    server server:8000;
}

server {
    listen 80;
    server_name _;

    # --- Listener app (FR-4): served at / ---
    location / {
        root /usr/share/nginx/html/listener;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # --- Capture station page ---
    location = /capture { return 301 /capture/; }
    location /capture/ {
        alias /usr/share/nginx/html/capture/;
        index index.html;
        try_files $uri $uri/ /capture/index.html;
    }

    # --- Operator console (auth deferred to M5) ---
    location = /admin { return 301 /admin/; }
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # --- LL-HLS output (design §7). Empty until M3; full LL-HLS tuning lands then. ---
    location /live/ {
        alias /srv/hls/live/;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control no-cache always;
        types {
            application/vnd.apple.mpegurl  m3u8;
            video/iso.segment              m4s;
            video/mp4                      mp4;
            application/json               json;
        }
        try_files $uri =404;
    }

    # --- Health (proxied to the server) ---
    location = /healthz {
        proxy_pass http://relay_server/healthz;
    }

    # --- Operator REST API ---
    location /api/ {
        proxy_pass http://relay_server;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- WebSockets: capture + operator (design §4 / §5) ---
    location /ws/ {
        proxy_pass http://relay_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
